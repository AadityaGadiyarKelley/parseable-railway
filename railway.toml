# railway.toml — Parseable service
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder       = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway provides a shell in startCommand even on distroless images.
# This sets P_ADDR to 0.0.0.0:$PORT using Railway's injected PORT variable.
startCommand = "parseable local-store"
healthcheckPath    = "/api/v1/liveness"
healthcheckTimeout = 300
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 10
